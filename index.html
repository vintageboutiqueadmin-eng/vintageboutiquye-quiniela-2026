@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap');
.q26 { --ink:#0D0F1E; --ink2:#171A30; --rojo:#E4022D; --azul:#1D6FF2; --verde:#00A95C;
  --oro:#FFC72C; --grad:linear-gradient(90deg,#E4022D 0%,#1D6FF2 50%,#00A95C 100%);
  font-family:'Inter',system-ui,sans-serif; color:#fff; min-height:100vh;
  background:
    radial-gradient(900px 420px at 15% -5%, rgba(228,2,45,.20), transparent 60%),
    radial-gradient(900px 420px at 85% -5%, rgba(0,169,92,.18), transparent 60%),
    radial-gradient(1100px 500px at 50% -10%, rgba(29,111,242,.25), transparent 65%),
    var(--ink); }
.q26 * { box-sizing:border-box; }
.q26 .topbar { height:5px; background:var(--grad); }
.q26 .disp { font-family:'Barlow Condensed',sans-serif; letter-spacing:.04em; }
.q26 .grad-text { background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
.q26 .wrap { max-width:880px; margin:0 auto; padding:16px 14px 90px; }
.q26 .hdr { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0 4px; flex-wrap:wrap; }
.q26 .logo { display:flex; align-items:baseline; gap:8px; }
.q26 .logo .t1 { font-size:30px; font-weight:800; color:#fff; line-height:1; }
.q26 .logo .t2 { font-size:30px; font-weight:800; line-height:1; }
.q26 .sub { color:#aab3cf; font-size:12px; margin-bottom:14px; }
.q26 .chipUser { background:var(--ink2); border:1px solid rgba(255,255,255,.16); border-radius:999px;
  padding:6px 12px; font-size:13px; font-weight:600; display:flex; gap:8px; align-items:center; }
.q26 .out { background:none; border:none; color:#aab3cf; cursor:pointer; font-size:12px; text-decoration:underline; }
.q26 .tabs { display:flex; gap:6px; margin:10px 0 16px; flex-wrap:wrap; }
.q26 .tab { font-family:'Barlow Condensed'; font-size:17px; font-weight:700; letter-spacing:.06em;
  padding:8px 16px; border-radius:8px; border:1px solid rgba(255,255,255,.18); background:transparent;
  color:#cdd5ea; cursor:pointer; text-transform:uppercase; position:relative; }
.q26 .tab.on { background:#fff; color:var(--ink); border-color:#fff; }
.q26 .tab.on::after { content:""; position:absolute; left:8px; right:8px; bottom:-4px; height:3px;
  border-radius:3px; background:var(--grad); }
.q26 .fases { display:flex; gap:6px; overflow-x:auto; padding-bottom:8px; margin-bottom:12px; }
.q26 .fase { flex:none; font-size:12px; font-weight:600; padding:6px 11px; border-radius:999px;
  border:1px solid rgba(255,255,255,.18); background:var(--ink2); color:#cdd5ea; cursor:pointer; white-space:nowrap; }
.q26 .fase.on { background:var(--grad); color:#fff; border-color:transparent; font-weight:700; }
.q26 .card { background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.02));
  border:1px solid rgba(255,255,255,.12); border-radius:14px; padding:12px 14px; margin-bottom:10px; }
.q26 .meta { display:flex; justify-content:space-between; align-items:center; font-size:11.5px;
  color:#aab3cf; margin-bottom:8px; }
.q26 .row { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:8px; }
.q26 .team { display:flex; align-items:center; gap:8px; min-width:0; }
.q26 .team.away { justify-content:flex-end; text-align:right; }
.q26 .tname { font-weight:600; font-size:14.5px; overflow:hidden; text-overflow:ellipsis; }
.q26 .flag { font-size:24px; line-height:1; }
.q26 .flagimg { border-radius:4px; object-fit:cover; box-shadow:0 1px 4px rgba(0,0,0,.5); border:1px solid rgba(255,255,255,.15); flex:none; }
.q26 .score { display:flex; align-items:center; gap:6px; }
.q26 .sin { width:48px; height:46px; text-align:center; font-family:'Barlow Condensed';
  font-size:26px; font-weight:700; color:var(--oro); background:#07091a;
  border:1px solid rgba(255,255,255,.2); border-radius:9px; outline:none; }
.q26 .sin:focus { border-color:var(--azul); box-shadow:0 0 0 2px rgba(29,111,242,.35); }
.q26 .sin:disabled { color:#7d86ab; background:#10132a; }
.q26 .dash { color:#5e6788; font-weight:700; }
.q26 .badge { font-size:11px; font-weight:700; border-radius:6px; padding:3px 8px; }
.q26 .b-lock { background:rgba(255,255,255,.1); color:#aab3cf; }
.q26 .b-open { background:rgba(0,169,92,.18); color:#3fe09a; }
.q26 .b-p5 { background:var(--oro); color:#3a2a00; }
.q26 .b-p3 { background:var(--verde); color:#fff; }
.q26 .b-p2 { background:var(--azul); color:#fff; }
.q26 .b-p0 { background:rgba(228,2,45,.25); color:#ff8da1; }
.q26 .res { font-family:'Barlow Condensed'; font-size:24px; font-weight:800; color:#fff;
  background:#07091a; border:1px solid rgba(255,255,255,.2); border-radius:9px; padding:6px 14px; }
.q26 .savebar { position:sticky; bottom:12px; display:flex; justify-content:center; margin-top:14px; }
.q26 .btn { font-family:'Barlow Condensed'; font-size:18px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; background:var(--grad); color:#fff; border:none;
  border-radius:10px; padding:12px 28px; cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,.5); }
.q26 .btn:disabled { opacity:.45; cursor:default; }
.q26 .btn2 { background:transparent; color:#fff; border:1px solid rgba(255,255,255,.45); box-shadow:none; }
.q26 .tscroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }
.q26 .lb { width:100%; min-width:430px; border-collapse:collapse; font-size:14px; }
.q26 .lb th { font-family:'Barlow Condensed'; font-size:14px; letter-spacing:.08em; text-transform:uppercase;
  color:#aab3cf; text-align:left; padding:8px 10px; border-bottom:1px solid rgba(255,255,255,.15); }
.q26 .lb td { padding:10px; border-bottom:1px solid rgba(255,255,255,.07); }
.q26 .lb tr.me td { background:rgba(255,199,44,.08); }
.q26 .pos { font-family:'Barlow Condensed'; font-size:20px; font-weight:800; color:var(--oro); width:36px; }
.q26 .pts { font-family:'Barlow Condensed'; font-size:22px; font-weight:800; color:#fff; }
.q26 .login { max-width:400px; margin:6vh auto 0; padding:0 14px 40px; }
.q26 .lcard { background:var(--ink2); border:1px solid rgba(255,255,255,.14); border-radius:16px; padding:24px 20px; position:relative; overflow:hidden; }
.q26 .lcard::before { content:""; position:absolute; top:0; left:0; right:0; height:4px; background:var(--grad); }
.q26 .lin { width:100%; padding:12px 14px; margin-bottom:10px; border-radius:10px; font-size:15px;
  background:#07091a; border:1px solid rgba(255,255,255,.2); color:#fff; outline:none; }
.q26 .lin:focus { border-color:var(--azul); }
.q26 .err { color:#ff8da1; font-size:13px; margin:6px 0; }
.q26 .ok { color:#3fe09a; font-size:13px; margin:6px 0; }
.q26 .fee { background:rgba(255,199,44,.1); border:1px solid var(--oro); border-radius:10px;
  padding:12px 14px; margin-bottom:14px; font-size:17px; line-height:1.5; color:#fff; text-align:center; }
.q26 .fee b { color:var(--oro); }
.q26 .fee span { font-size:14px; color:#dbe1f2; }
.q26 .acc { display:flex; gap:10px; align-items:flex-start; font-size:13.5px; color:#dbe1f2;
  margin:4px 0 12px; cursor:pointer; line-height:1.45; }
.q26 .acc input { margin-top:3px; accent-color:#FFC72C; width:16px; height:16px; flex:none; }
.q26 .lmodes { display:flex; gap:8px; margin-bottom:12px; }
.q26 .lmode { flex:1; font-family:'Barlow Condensed'; font-size:16px; font-weight:700; letter-spacing:.05em;
  text-transform:uppercase; padding:9px 0; border-radius:9px; cursor:pointer;
  background:transparent; color:#cdd5ea; border:1px solid rgba(255,255,255,.25); }
.q26 .lmode.on { background:#fff; color:var(--ink); border-color:#fff; }
.q26 select.lin option, .q26 .sel option { color:#0D0F1E; background:#fff; }
.q26 .pozo { background:rgba(255,199,44,.1); border:1px solid rgba(255,199,44,.5); border-radius:12px;
  padding:10px 16px; margin-bottom:14px; display:flex; justify-content:space-between; align-items:center;
  font-size:15px; flex-wrap:wrap; gap:6px; }
.q26 .pozo .qq { font-family:'Barlow Condensed'; font-size:30px; font-weight:800; color:#3a2a00;
  background:linear-gradient(180deg,#FFE9A8,#F2BE3A); padding:4px 18px; border-radius:10px;
  box-shadow:0 3px 12px rgba(255,199,44,.35); letter-spacing:.02em; }
.q26 .note { font-size:12px; color:#aab3cf; line-height:1.5; }
.q26 .sel { background:#07091a; color:#fff; border:1px solid rgba(255,255,255,.2);
  border-radius:8px; padding:7px 8px; font-size:13px; max-width:46%; }
.q26 .rules p { color:#dbe1f2; font-size:14px; line-height:1.7; }
.q26 .rules b { color:var(--oro); }
.q26 .ko { font-size:13px; color:#cdd5ea; font-weight:600; }
.q26 .spin { text-align:center; color:#aab3cf; padding:40px 0; }
.q26 .dianav { display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
.q26 .diab { width:38px; height:38px; border-radius:10px; border:1px solid rgba(255,255,255,.25);
  background:var(--ink2); color:#fff; font-size:20px; font-weight:700; cursor:pointer; line-height:1; }
.q26 .diab:hover { border-color:#fff; }
.q26 .dialbl { font-family:'Barlow Condensed'; font-size:21px; font-weight:700; letter-spacing:.04em;
  text-transform:capitalize; display:flex; align-items:center; gap:8px; }
.q26 .hoytag { font-size:12px; background:var(--grad); color:#fff; border-radius:6px; padding:2px 8px; letter-spacing:.1em; }
